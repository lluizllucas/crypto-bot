name: Deploy Trading Bot

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy no servidor
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          script_stop: false
          script: |
            if [ ! -d ~/trading-bot ]; then
              git clone https://github.com/${{ github.repository }}.git ~/trading-bot
            fi

            cd ~/trading-bot
            git fetch origin main
            git reset --hard origin/main

            docker stop trading-bot || true
            docker rm trading-bot || true
            docker system prune -a -f

            docker build -t trading-bot .

            echo "=== Verificando secrets ==="
            echo "OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY && 'OK' || 'VAZIO' }}"
            echo "BINANCE_TESTNET_API_KEY: ${{ secrets.BINANCE_TESTNET_API_KEY && 'OK' || 'VAZIO' }}"
            echo "BINANCE_TESTNET_SECRET_KEY: ${{ secrets.BINANCE_TESTNET_SECRET_KEY && 'OK' || 'VAZIO' }}"
            echo "BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY && 'OK' || 'VAZIO' }}"
            echo "BINANCE_SECRET_KEY: ${{ secrets.BINANCE_SECRET_KEY && 'OK' || 'VAZIO' }}"
            echo "DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL && 'OK' || 'VAZIO' }}"
            echo "SUPABASE_URL: ${{ secrets.SUPABASE_URL && 'OK' || 'VAZIO' }}"
            echo "SUPABASE_KEY: ${{ secrets.SUPABASE_KEY && 'OK' || 'VAZIO' }}"
            echo "SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY && 'OK' || 'VAZIO' }}"
            echo "==========================="

            docker run -d \
              --name trading-bot \
              --restart unless-stopped \
              --env OPENROUTER_API_KEY="${{ secrets.OPENROUTER_API_KEY }}" \
              --env BINANCE_TESTNET_API_KEY="${{ secrets.BINANCE_TESTNET_API_KEY }}" \
              --env BINANCE_TESTNET_SECRET_KEY="${{ secrets.BINANCE_TESTNET_SECRET_KEY }}" \
              --env BINANCE_API_KEY="${{ secrets.BINANCE_API_KEY }}" \
              --env BINANCE_SECRET_KEY="${{ secrets.BINANCE_SECRET_KEY }}" \
              --env DISCORD_WEBHOOK_URL="${{ secrets.DISCORD_WEBHOOK_URL }}" \
              --env SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
              --env SUPABASE_KEY="${{ secrets.SUPABASE_KEY }}" \
              --env SUPABASE_SERVICE_KEY="${{ secrets.SUPABASE_SERVICE_KEY }}" \
              trading-bot

            sleep 10
            docker ps --filter name=trading-bot
            docker logs trading-bot --tail 15 2>&1
